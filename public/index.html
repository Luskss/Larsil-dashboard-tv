<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monitor de Serviços</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="./tema.css">
  <style>
    /* ===== SPA: o site inteiro num único HTML (menos gestao.html) =====
       Cada "página" é uma <section class="vista"> aqui dentro e a troca é só
       display — sem navegação de verdade, para a barra do navegador da TV
       (Amazon Silk) não aparecer a cada troca. Bolinhas, rotação automática e
       a troca de vista ficam em paginacao.js. */
    html, body { height: 100%; }
    body { overflow: hidden; }
    .vista { display: none; }
    .vista--ativa {
      display: flex;
      flex-direction: column;
      height: 100%;
      /* keyframes pagina-entrar vêm do CSS injetado por paginacao.js */
      animation: pagina-entrar .35s ease both;
    }

    /* ===== Blocos compartilhados entre as vistas ===== */
    .painel {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 1.5rem;
      padding: 1.25rem;
    }

    /* KPI: número grande colorido + rótulo (Frotas e Ativos de TI). */
    .kpi {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: .35rem;
      text-align: center;
      min-height: 0;
      overflow: hidden;
    }
    .kpi__valor {
      font-size: clamp(3rem, 7vw, 4.5rem);
      font-weight: 800;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      color: var(--cor-kpi, var(--text));
    }
    .kpi__rotulo {
      font-size: .85rem;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
    }
    .kpi--trabalhando  { --cor-kpi: var(--success); }
    .kpi--oficina      { --cor-kpi: var(--alert); }
    .kpi--estragado    { --cor-kpi: var(--critical); }
    .kpi--semAtividade { --cor-kpi: var(--text); }

    /* ===== Vista Dashboard (esqueleto do mockup) =====
       Grid ÚNICO: tudo é bloco. O relógio é um bloco que ocupa células
       fixas; os demais são placeholders. A altura das fileiras é ajustada
       via JS (grid-auto-rows) para caber na janela sem rolagem.

       Tamanhos de bloco (combine as classes):
         (nenhuma)     -> 1x1
         .bloco--w2    -> 2 colunas
         .bloco--h2    -> 2 fileiras
         .bloco--w2h2  -> 2x2
         .bloco--w3h2  -> 3x2                                              */
    .tiles {
      margin-top: 1rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
      gap: 1rem;
      grid-auto-flow: dense; /* preenche buracos ao redor dos blocos grandes */
    }
    .tile {
      border-radius: 1.5rem;
      background: var(--surface);
      border: 2px solid var(--border);
    }
    .bloco--w2   { grid-column: span 2; }
    .bloco--h2   { grid-row: span 2; }
    .bloco--w2h2 { grid-column: span 2; grid-row: span 2; }
    .bloco--w3h2 { grid-column: span 3; grid-row: span 2; }
    .bloco--w3h4 { grid-column: span 3; grid-row: span 4; }
    .bloco--w4h4 { grid-column: span 4; grid-row: span 4; }

    /* Posições fixas (o dense flow sozinho encostaria o clima ao lado do
       relógio; aqui pregamos cada um na sua célula). Relógio 5x3 no topo,
       clima logo abaixo. */
    .pos--relogio { grid-column: 1 / span 5; grid-row: 2 / span 3; }
    .pos--clima   { grid-column: 1 / span 7; grid-row: 5 / span 3; }

    /* Widget real no estilo "pílula" do mockup (relógio + clima).
       container-type permite dimensionar o conteúdo pela largura do PRÓPRIO
       card (unidade cqw), e não da janela — o relógio nunca vaza da borda. */
    .widget {
      border: 2px solid var(--border);
      border-radius: 1.5rem;
      padding: 1rem 1.5rem;
      background: var(--surface);
      display: flex;
      flex-direction: column;
      justify-content: center;
      container-type: inline-size;
      overflow: hidden;
    }
    .relogio {
      font-size: clamp(1.5rem, 22cqw, 9rem);
      font-weight: 800;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      letter-spacing: .02em;
    }
    .saudacao {
      margin-top: .5rem;
      font-size: clamp(.9rem, 10cqw, 2.25rem);
      font-weight: 500;
      color: var(--text-dim);
    }

    /* Painel de clima (estilo lovable): clima de agora em cima — temperatura
       grande + sensação/umidade/vento — e a previsão da semana em chips
       embaixo. As fontes escalam pela largura do card (cqw). */
    .clima-widget {
      flex-direction: column;
      justify-content: space-between;
      gap: .85rem;
    }
    .clima-atual {
      display: flex;
      align-items: center;
      gap: 1.25rem;
      min-width: 0;
    }
    .clima-atual__temp {
      font-size: clamp(2.25rem, 9cqw, 5rem);
      font-weight: 300;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    .clima-atual__rotulo {
      font-size: .75rem;
      font-weight: 700;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: .06em;
    }
    .clima-atual__cond { font-size: clamp(.95rem, 3cqw, 1.35rem); font-weight: 600; }
    .clima-detalhes {
      display: flex;
      gap: clamp(.75rem, 4cqw, 2.5rem);
      margin-left: auto;
      text-align: right;
    }
    .clima-detalhes span { display: block; font-size: .72rem; color: var(--text-dim); }
    .clima-detalhes strong { font-size: clamp(1rem, 3cqw, 1.5rem); font-weight: 700; }

    /* Fase da lua: disco escuro fixo com o "lado claro" deslizando por cima
       (a fração visível é a iluminação — mesma técnica do lovable). */
    .clima-lua { display: flex; align-items: center; gap: .6rem; }
    .clima-lua__disco {
      width: 2.6rem; height: 2.6rem;
      border-radius: 50%;
      position: relative;
      overflow: hidden;
      background: #0c130d;
      border: 1px solid var(--border);
      flex: 0 0 auto;
    }
    .clima-lua__luz {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: radial-gradient(circle at 38% 34%, #f4f7ea 0%, #d4dcbd 68%, #bcc7a3 100%);
    }
    .clima-lua__nome { display: block; font-size: .85rem; font-weight: 600; white-space: nowrap; }
    .clima-lua__pct { display: block; font-size: .72rem; color: var(--text-dim); white-space: nowrap; }
    .clima-semana { display: flex; gap: .6rem; flex: 1; min-height: 0; }
    .clima-dia {
      flex: 1;
      min-width: 0;
      min-height: 0;
      overflow: hidden; /* com o rem maior, o texto não vaza do chip */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: .35rem;
      padding: .6rem .35rem;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: .75rem;
    }
    .clima-dia__nome { font-size: .85rem; font-weight: 700; color: var(--text-dim); }
    /* nowrap: máxima e mínima sempre na mesma linha, em todos os chips */
    .clima-dia__temps { font-size: 1rem; font-weight: 700; font-variant-numeric: tabular-nums; white-space: nowrap; }
    .clima-dia__temps small { font-weight: 500; color: var(--text-dim); }
    .clima__icone { width: 1.75rem; height: 1.75rem; flex: 0 0 auto; }

    /* ===== Vista Frotas: donut grande à esquerda, 4 tiles de status em 2x2
       à direita. Ocupa o espaço restante da janela; as fileiras dividem a
       altura em vez de ter mínimo fixo. ===== */
    .frota-grid {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1.35fr) minmax(0, .55fr) minmax(0, .55fr);
      grid-template-rows: repeat(2, minmax(0, 1fr));
      gap: 1.25rem;
    }
    .frota-grid > .painel { min-height: 0; }
    .frota-grid__donut { grid-row: span 2; }
    @media (max-width: 820px) {
      .frota-grid { grid-template-columns: 1fr 1fr; }
      .frota-grid__donut { grid-column: span 2; grid-row: auto; }
    }

    /* Fileira de cards por tipo de frota (abaixo da grade principal).
       Mesmo visual dos KPIs de status, mas neutros e um pouco menores.
       Altura presa à janela (vh) para a fileira nunca empurrar a página. */
    .tipos-grid {
      flex: 0 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      grid-auto-rows: clamp(90px, 15vh, 160px);
      gap: 1.25rem;
      margin-top: 1.25rem;
    }
    .tipos-grid:empty { display: none; }
    .tipos-grid .kpi { padding: .75rem 1rem; }
    .tipos-grid .kpi__valor { font-size: clamp(1.75rem, 7vh, 3.5rem); }

    /* Donut por status: o painel vira uma coluna (título em cima, donut
       embaixo) e o SVG preenche a altura que sobrar — sem mínimo fixo. */
    .frota-grid__donut {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .donut-area {
      flex: 1;
      min-height: 0;
      display: flex;
      align-items: center;
      gap: 1rem;
      transition: opacity .25s ease; /* fade da troca status <-> tipo */
    }
    .donut-area--trocando { opacity: 0; }
    @media (prefers-reduced-motion: reduce) {
      .donut-area { transition: none; }
    }
    .donut-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      min-height: 0;
      position: relative;
      flex: 1 1 380px;
      min-width: 0;
    }
    .donut-wrap svg { width: min(100%, 560px); height: 100%; overflow: visible; }

    /* Legenda: chip de cor + nome + quantidade (identidade nunca só na cor). */
    .legenda {
      flex: 0 0 auto;
      display: flex;
      flex-direction: column;
      gap: .5rem;
      font-size: .82rem;
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .legenda li { display: flex; align-items: center; gap: .5rem; }
    .legenda__cor {
      width: 10px; height: 10px;
      border-radius: 3px;
      flex: 0 0 auto;
    }
    .legenda__nome { font-weight: 600; }
    .legenda__qtd { color: var(--text-dim); font-variant-numeric: tabular-nums; }
    .donut-fatia { cursor: default; transition: filter .15s ease; }
    .donut-fatia:hover { filter: brightness(1.15); }
    .donut-rotulo {
      font-size: 13px;
      font-weight: 600;
      fill: var(--text);
    }
    .donut-rotulo tspan.pct { font-weight: 700; fill: var(--text); }

    /* Tooltip flutuante do donut (segue o mouse). */
    .donut-tooltip {
      position: fixed;
      z-index: 60;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: .45rem;
      padding: .25rem .6rem;
      font-size: .78rem;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity .12s ease;
    }

    .painel__titulo { font-weight: 700; }
    .painel__subtitulo { font-size: .8rem; color: var(--text-dim); margin-top: .1rem; }

    .frota-aviso {
      margin-top: 1rem;
      padding: .85rem 1rem;
      border: 1px solid var(--border);
      border-radius: .75rem;
      background: var(--surface-2);
      color: var(--text-dim);
      font-size: .9rem;
      display: none;
    }
    .frota-aviso--visivel { display: block; }

    /* ===== Vista Ativos de TI: cards dividem a altura que sobra ===== */
    .ativos-grid {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      grid-auto-rows: minmax(0, 1fr);
      gap: 1.25rem;
    }

    .ativos-aviso {
      margin-top: 1rem;
      padding: .85rem 1rem;
      border: 1px solid var(--border);
      border-radius: .75rem;
      background: var(--surface-2);
      color: var(--text-dim);
      font-size: .9rem;
      display: none;
    }
    .ativos-aviso--visivel { display: block; }

    /* ===== Vista Helpdesk: três colunas kanban; o excesso de cards rola
       DENTRO da coluna — a página em si nunca rola. ===== */
    .colunas {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.25rem;
      align-items: stretch;
    }
    @media (max-width: 900px) { .colunas { grid-template-columns: 1fr; } }

    /* Cada coluna é um flex vertical: título fixo, cards no espaço restante. */
    .colunas > .painel {
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .coluna__cards {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .coluna__titulo {
      display: flex;
      align-items: center;
      gap: .5rem;
      font-size: 1.15rem;
      font-weight: 800;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--cor-status, var(--text));
      margin-bottom: 1rem;
    }
    .coluna__bolinha {
      width: 10px; height: 10px;
      border-radius: 999px;
      background: var(--cor-status, var(--text-dim));
      flex: 0 0 auto;
    }
    .coluna__qtd {
      margin-left: auto;
      font-variant-numeric: tabular-nums;
      color: var(--text-dim);
    }
    .coluna__vazia { color: var(--text-dim); font-size: .9rem; }

    /* Card de chamado: mesmo padrão dos blocos internos das outras vistas
       (surface-2 + borda fina). */
    .chamado {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: .75rem;
      padding: .75rem .85rem;
    }
    .chamado + .chamado { margin-top: .75rem; }
    .chamado__topo {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: .5rem;
      font-size: .75rem;
      color: var(--text-dim);
      font-variant-numeric: tabular-nums;
    }
    .chamado__prioridade {
      font-weight: 700;
      letter-spacing: .05em;
      text-transform: uppercase;
      color: var(--cor-prioridade, var(--text-dim));
    }
    .chamado__titulo {
      margin-top: .25rem;
      font-weight: 600;
      line-height: 1.3;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    .chamado__pessoa {
      margin-top: .4rem;
      font-size: .8rem;
      color: var(--text-dim);
    }
    .chamado__pessoa strong { color: var(--text); font-weight: 600; }

    .chamados-aviso {
      margin-top: 1rem;
      padding: .85rem 1rem;
      border: 1px solid var(--border);
      border-radius: .75rem;
      background: var(--surface-2);
      color: var(--text-dim);
      font-size: .9rem;
      display: none;
    }
    .chamados-aviso--visivel { display: block; }
  </style>
</head>
<body class="min-h-screen">
  <!-- ===== Vista Dashboard (relógio + clima + placeholders) ===== -->
  <section id="vista-dashboard" class="vista vista--ativa w-full max-w-10xl mx-auto px-6 pt-6 pb-0">
    <div class="flex items-center justify-end mb-3">
      <div class="flex items-center gap-3">
        <button id="atualizar-btn" class="btn-icone" type="button" aria-label="Atualizar status">
          <svg class="icone-reload" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M23 4v6h-6"/>
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Grid único do dashboard: widgets reais + placeholders, todos blocos. -->
    <div id="tiles" class="tiles">
      <!-- Relógio + saudação: 5x3 células, fixo no topo esquerdo. -->
      <div class="widget pos--relogio anima-surgir" data-bloco="15" style="--ordem: 0;">
        <div id="relogio" class="relogio">--:--:--</div>
        <div id="saudacao" class="saudacao">&nbsp;</div>
      </div>

      <!-- Clima: 7x3 células abaixo do relógio — agora + previsão da semana. -->
      <div class="widget clima-widget pos--clima anima-surgir" data-bloco="21" style="--ordem: 1;">
        <div class="clima-atual">
          <div id="clima-temp" class="clima-atual__temp">--°</div>
          <div>
            <div class="clima-atual__rotulo">Clima agora</div>
            <div id="clima-cond" class="clima-atual__cond">Configure sua cidade</div>
          </div>
          <div class="clima-detalhes">
            <div><span>Sensação</span><strong id="clima-sensacao">—</strong></div>
            <div><span>Umidade</span><strong id="clima-umidade">—</strong></div>
            <div><span>Vento</span><strong id="clima-vento">—</strong></div>
          </div>
          <div class="clima-lua">
            <div class="clima-lua__disco"><div class="clima-lua__luz"></div></div>
            <div>
              <span class="clima-lua__nome">—</span>
              <span class="clima-lua__pct">—</span>
            </div>
          </div>
        </div>
        <div id="clima-semana" class="clima-semana"></div>
      </div>
    </div>
  </section>

  <!-- ===== Vista Frotas (donut + KPIs de status + cards por tipo) ===== -->
  <section id="vista-frotas" class="vista w-full max-w-[1600px] mx-auto px-6 pt-6 pb-0">
    <div class="flex items-center justify-between mb-3">
      <h1 class="text-3xl font-extrabold tracking-wide uppercase">Frotas</h1>
    </div>

    <div id="frota-aviso" class="frota-aviso" role="alert"></div>

    <div class="frota-grid mt-3">
      <!-- Donut: alterna a cada 30s entre frota por status e por tipo -->
      <div class="painel frota-grid__donut">
        <div id="painel-donut-titulo" class="painel__titulo"></div>
        <div id="painel-donut-subtitulo" class="painel__subtitulo"></div>
        <div class="donut-area">
          <div id="donut" class="donut-wrap" role="img" aria-label="Frota por status"></div>
          <ul id="donut-legenda" class="legenda"></ul>
        </div>
      </div>

      <!-- Status da frota (contagens de dbo.FROTA) -->
      <div class="painel kpi kpi--trabalhando">
        <div class="kpi__valor" data-kpi="trabalhando">–</div>
        <div class="kpi__rotulo">Trabalhando</div>
      </div>
      <div class="painel kpi kpi--oficina">
        <div class="kpi__valor" data-kpi="oficina">–</div>
        <div class="kpi__rotulo">Na oficina</div>
      </div>
      <div class="painel kpi kpi--estragado">
        <div class="kpi__valor" data-kpi="estragado">–</div>
        <div class="kpi__rotulo">Estragado</div>
      </div>
      <div class="painel kpi kpi--semAtividade">
        <div class="kpi__valor" data-kpi="semAtividade">–</div>
        <div class="kpi__rotulo">Sem atividade</div>
      </div>
    </div>

    <!-- Cards por tipo de frota (preenchidos pelo frotas.js a partir de dados.tipos) -->
    <div id="tipos-cards" class="tipos-grid"></div>
  </section>

  <!-- ===== Vista Ativos de TI (contagem por tipo) ===== -->
  <section id="vista-ativos" class="vista w-full max-w-[1600px] mx-auto px-6 pt-6 pb-0">
    <div class="flex items-center justify-between mb-3">
      <h1 class="text-3xl font-extrabold tracking-wide uppercase">Ativos de TI</h1>
    </div>

    <div id="ativos-aviso" class="ativos-aviso" role="alert"></div>

    <!-- Cards por tipo de ativo (preenchidos pelo ativos-ti.js) -->
    <div id="ativos-cards" class="ativos-grid mt-3"></div>
  </section>

  <!-- ===== Vista Helpdesk (chamados por status) ===== -->
  <section id="vista-helpdesk" class="vista w-full max-w-[1600px] mx-auto px-6 pt-6 pb-0">
    <div class="flex items-center justify-between mb-3">
      <h1 class="text-3xl font-extrabold tracking-wide uppercase">Helpdesk</h1>
    </div>

    <div id="chamados-aviso" class="chamados-aviso" role="alert"></div>

    <!-- Colunas de chamados por status (preenchidas pelo helpdesk-chamados.js) -->
    <div id="colunas" class="colunas mt-3"></div>
  </section>

  <div id="donut-tooltip" class="donut-tooltip" aria-hidden="true"></div>

  <script src="./main.js" type="module"></script>
  <script src="./frotas.js" type="module"></script>
  <script src="./ativos-ti.js" type="module"></script>
  <script src="./helpdesk-chamados.js" type="module"></script>
</body>
</html>
