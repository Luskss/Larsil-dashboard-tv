<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frotas</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="./tema.css">
  <style>
    /* Tema, toggle e botões vêm de tema.css. Aqui, só o CSS desta página. */

    /* A página inteira cabe na janela (painel de TV): o corpo trava a
       altura e a grade divide o espaço que sobra depois do cabeçalho —
       nada de rolagem. */
    html, body { height: 100%; }
    body { overflow: hidden; }
    .pagina {
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    /* ===== Grade da página (mockup): donut grande à esquerda,
       4 tiles de status em 2x2 à direita. Ocupa o espaço restante da
       janela; as fileiras dividem a altura em vez de ter mínimo fixo. ===== */
    .frota-grid {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1.35fr) minmax(0, .55fr) minmax(0, .55fr);
      grid-template-rows: repeat(2, minmax(0, 1fr));
      gap: 1.25rem;
    }
    .frota-grid > .painel { min-height: 0; }
    .frota-grid__donut { grid-row: span 2; }
    @media (max-width: 820px) {
      .frota-grid { grid-template-columns: 1fr 1fr; }
      .frota-grid__donut { grid-column: span 2; grid-row: auto; }
    }

    .painel {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 1.5rem;
      padding: 1.25rem;
    }

    /* Tiles de status: número grande colorido + rótulo, como no mockup. */
    .kpi {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: .35rem;
      text-align: center;
      min-height: 0;
      overflow: hidden;
    }
    .kpi__valor {
      font-size: clamp(3rem, 7vw, 4.5rem);
      font-weight: 800;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      color: var(--cor-kpi, var(--text));
    }
    .kpi__rotulo {
      font-size: .85rem;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
    }
    .kpi--trabalhando  { --cor-kpi: var(--success); }
    .kpi--oficina      { --cor-kpi: var(--alert); }
    .kpi--estragado    { --cor-kpi: var(--critical); }
    .kpi--semAtividade { --cor-kpi: var(--text); }

    /* Fileira de cards por tipo de frota (abaixo da grade principal).
       Mesmo visual dos KPIs de status, mas neutros e um pouco menores.
       Altura presa à janela (vh) para a fileira nunca empurrar a página. */
    .tipos-grid {
      flex: 0 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      grid-auto-rows: clamp(90px, 15vh, 160px);
      gap: 1.25rem;
      margin-top: 1.25rem;
    }
    .tipos-grid:empty { display: none; }
    .tipos-grid .kpi { padding: .75rem 1rem; }
    .tipos-grid .kpi__valor { font-size: clamp(1.75rem, 7vh, 3.5rem); }

    /* ===== Donut por status =====
       O painel vira uma coluna (título em cima, donut embaixo) e o SVG
       preenche a altura que sobrar — sem mínimo fixo, sem estourar. */
    .frota-grid__donut {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .donut-area {
      flex: 1;
      min-height: 0;
      display: flex;
      align-items: center;
      gap: 1rem;
      transition: opacity .25s ease; /* fade da troca status <-> tipo */
    }
    .donut-area--trocando { opacity: 0; }
    @media (prefers-reduced-motion: reduce) {
      .donut-area { transition: none; }
    }
    .donut-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      min-height: 0;
      position: relative;
      flex: 1 1 380px;
      min-width: 0;
    }
    .donut-wrap svg { width: min(100%, 560px); height: 100%; overflow: visible; }

    /* Legenda: chip de cor + nome + quantidade (identidade nunca só na cor). */
    .legenda {
      flex: 0 0 auto;
      display: flex;
      flex-direction: column;
      gap: .5rem;
      font-size: .82rem;
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .legenda li { display: flex; align-items: center; gap: .5rem; }
    .legenda__cor {
      width: 10px; height: 10px;
      border-radius: 3px;
      flex: 0 0 auto;
    }
    .legenda__nome { font-weight: 600; }
    .legenda__qtd { color: var(--text-dim); font-variant-numeric: tabular-nums; }
    .donut-fatia { cursor: default; transition: filter .15s ease; }
    .donut-fatia:hover { filter: brightness(1.15); }
    .donut-rotulo {
      font-size: 13px;
      font-weight: 600;
      fill: var(--text);
    }
    .donut-rotulo tspan.pct { font-weight: 700; fill: var(--text); }

    /* Tooltip flutuante do donut (segue o mouse). */
    .donut-tooltip {
      position: fixed;
      z-index: 60;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: .45rem;
      padding: .25rem .6rem;
      font-size: .78rem;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity .12s ease;
    }

    .painel__titulo { font-weight: 700; }
    .painel__subtitulo { font-size: .8rem; color: var(--text-dim); margin-top: .1rem; }

    /* Estado de aviso (banco não configurado / erro de consulta). */
    .frota-aviso {
      margin-top: 1rem;
      padding: .85rem 1rem;
      border: 1px solid var(--border);
      border-radius: .75rem;
      background: var(--surface-2);
      color: var(--text-dim);
      font-size: .9rem;
      display: none;
    }
    .frota-aviso--visivel { display: block; }
  </style>
</head>
<body class="min-h-screen">
  <div class="pagina w-full max-w-[1600px] mx-auto px-6 pt-6 pb-0">
    <div class="flex items-center justify-between mb-3">
      <div>
        <h1 class="text-3xl font-extrabold tracking-wide uppercase">Frotas</h1>
        </div>
    </div>

    <div id="frota-aviso" class="frota-aviso" role="alert"></div>

    <div class="frota-grid mt-3">
      <!-- Donut: alterna a cada 30s entre frota por status e por tipo -->
      <div class="painel frota-grid__donut">
        <div id="painel-donut-titulo" class="painel__titulo"></div>
        <div id="painel-donut-subtitulo" class="painel__subtitulo"></div>
        <div class="donut-area">
          <div id="donut" class="donut-wrap" role="img" aria-label="Frota por status"></div>
          <ul id="donut-legenda" class="legenda"></ul>
        </div>
      </div>

      <!-- Status da frota (contagens de dbo.FROTA) -->
      <div class="painel kpi kpi--trabalhando">
        <div class="kpi__valor" data-kpi="trabalhando">–</div>
        <div class="kpi__rotulo">Trabalhando</div>
      </div>
      <div class="painel kpi kpi--oficina">
        <div class="kpi__valor" data-kpi="oficina">–</div>
        <div class="kpi__rotulo">Na oficina</div>
      </div>
      <div class="painel kpi kpi--estragado">
        <div class="kpi__valor" data-kpi="estragado">–</div>
        <div class="kpi__rotulo">Estragado</div>
      </div>
      <div class="painel kpi kpi--semAtividade">
        <div class="kpi__valor" data-kpi="semAtividade">–</div>
        <div class="kpi__rotulo">Sem atividade</div>
      </div>
    </div>

    <!-- Cards por tipo de frota (preenchidos pelo frotas.js a partir de dados.tipos) -->
    <div id="tipos-cards" class="tipos-grid"></div>
  </div>

  <div id="donut-tooltip" class="donut-tooltip" aria-hidden="true"></div>

  <script src="./frotas.js" type="module"></script>
</body>
</html>
