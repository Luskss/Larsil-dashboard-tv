<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestão</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="./tema.css">
  <style>
    /* Tema, toggle e botões vêm de tema.css. Aqui, só o CSS desta página. */
    .card-cfg { background: var(--surface); border: 1px solid var(--border); }

    .lista-paginas { display: flex; flex-direction: column; gap: .5rem; }
    .item-pagina {
      display: flex;
      align-items: center;
      gap: .75rem;
      padding: .75rem 1rem;
      border-radius: .75rem;
      background: var(--surface-2);
      border: 1px solid var(--border);
      transition: transform .15s ease, opacity .15s ease, border-color .15s ease;
    }
    .item-pagina input[type="checkbox"] {
      width: 18px; height: 18px;
      accent-color: var(--success);
      flex: 0 0 auto;
    }
    .item-pagina__rotulo { font-weight: 600; }
    .item-pagina__arquivo {
      font-size: .8rem;
      color: var(--text-dim);
      font-variant-numeric: tabular-nums;
    }
    .item-pagina__alca {
      cursor: grab;
      color: var(--text-dim);
      flex: 0 0 auto;
      user-select: none;
      font-size: 1.1rem;
      line-height: 1;
      padding: 0 .25rem;
    }
    .item-pagina__alca:active { cursor: grabbing; }
    .item-pagina--arrastando { opacity: .4; }
    .item-pagina--sobre { border-color: var(--success); }

    .campo-cidade {
      display: flex;
      gap: .5rem;
      max-width: 24rem;
    }
    .campo-cidade input {
      flex: 1;
      padding: .6rem .9rem;
      border-radius: .75rem;
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 1rem;
    }
    .campo-cidade button {
      padding: .6rem 1.2rem;
      border-radius: .75rem;
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text);
      font-weight: 600;
      cursor: pointer;
    }
    .campo-cidade button:hover { background: var(--surface); }
    .cidade-status {
      font-size: .85rem;
      color: var(--text-dim);
      margin-top: .5rem;
      min-height: 1.2em;
    }
  </style>
</head>
<body class="min-h-screen">
  <div class="max-w-[1600px] mx-auto p-6">
    <div class="flex items-center justify-between mb-6">
      <h1 class="text-3xl font-extrabold tracking-wide uppercase">Gestão</h1>
    </div>

    <div class="card-cfg rounded p-4 mb-6">
      <h2 class="font-bold mb-1">Cidade do clima</h2>
      <p class="text-sm mb-4" style="color: var(--text-dim);">
        Usada pelo widget de clima no Dashboard (temperatura atual e previsão de amanhã).
      </p>
      <form id="form-cidade" class="campo-cidade">
        <input type="text" id="input-cidade" placeholder="Ex.: São Paulo" autocomplete="off">
        <button type="submit">Salvar</button>
      </form>
      <div id="cidade-status" class="cidade-status"></div>
    </div>

    <div class="card-cfg rounded p-4">
      <h2 class="font-bold mb-1">Páginas visíveis na navegação</h2>
      <p class="text-sm mb-4" style="color: var(--text-dim);">
        Desmarque uma página para tirá-la da barra de bolinhas do rodapé (ela continua acessível pela URL).
        Arraste pela alça (⠿) para reordenar as bolinhas.
      </p>
      <div id="lista-paginas" class="lista-paginas"></div>
    </div>
  </div>

  <script type="module">
    import { PAGINAS, paginasVisiveis, salvarPaginasVisiveis, paginasOrdenadas, salvarPaginasOrdem } from "./paginacao.js";
    import { getConfig, setConfig } from "./downdetector.js";

    // Sem montarPaginacao(): esta página fica sempre fora da navegação/transição
    // (paginacao.js trata gestao.html como oculta por padrão).

    // ===== Cidade do clima =====
    const inputCidade = document.querySelector("#input-cidade");
    const statusCidade = document.querySelector("#cidade-status");

    getConfig("cidade").then((cidade) => {
      inputCidade.value = cidade || "";
    });

    document.querySelector("#form-cidade").addEventListener("submit", async (ev) => {
      ev.preventDefault();
      statusCidade.textContent = "Salvando...";
      try {
        await setConfig("cidade", inputCidade.value.trim());
        statusCidade.textContent = "Cidade salva.";
      } catch {
        statusCidade.textContent = "Erro ao salvar a cidade.";
      }
    });

    const lista = document.querySelector("#lista-paginas");
    const visiveis = new Set(paginasVisiveis());
    let ordem = paginasOrdenadas();

    function renderizarLista() {
      lista.innerHTML = ordem.map((p) => `
        <label class="item-pagina" draggable="true" data-arquivo="${p.arquivo}">
          <span class="item-pagina__alca" draggable="false" title="Arrastar para reordenar">⠿</span>
          <input type="checkbox" data-arquivo="${p.arquivo}" ${visiveis.has(p.arquivo) ? "checked" : ""}>
          <span class="item-pagina__rotulo">${p.rotulo}</span>
          <span class="item-pagina__arquivo ml-auto">${p.arquivo}</span>
        </label>
      `).join("");
    }

    renderizarLista();

    lista.addEventListener("change", (ev) => {
      const alvo = ev.target;
      if (alvo.dataset.arquivo && alvo.type === "checkbox") {
        if (alvo.checked) visiveis.add(alvo.dataset.arquivo);
        else visiveis.delete(alvo.dataset.arquivo);
        salvarPaginasVisiveis([...visiveis]);
      }
    });

    // Reordenação por drag-and-drop das linhas.
    let arquivoArrastado = null;

    lista.addEventListener("dragstart", (ev) => {
      const item = ev.target.closest(".item-pagina");
      if (!item) return;
      arquivoArrastado = item.dataset.arquivo;
      item.classList.add("item-pagina--arrastando");
      ev.dataTransfer.effectAllowed = "move";
    });

    lista.addEventListener("dragend", (ev) => {
      const item = ev.target.closest(".item-pagina");
      if (item) item.classList.remove("item-pagina--arrastando");
      lista.querySelectorAll(".item-pagina--sobre").forEach((el) => el.classList.remove("item-pagina--sobre"));
      arquivoArrastado = null;
    });

    lista.addEventListener("dragover", (ev) => {
      ev.preventDefault();
      const item = ev.target.closest(".item-pagina");
      lista.querySelectorAll(".item-pagina--sobre").forEach((el) => el.classList.remove("item-pagina--sobre"));
      if (item && item.dataset.arquivo !== arquivoArrastado) item.classList.add("item-pagina--sobre");
    });

    lista.addEventListener("drop", (ev) => {
      ev.preventDefault();
      const item = ev.target.closest(".item-pagina");
      if (!item || !arquivoArrastado || item.dataset.arquivo === arquivoArrastado) return;

      const origem = ordem.findIndex((p) => p.arquivo === arquivoArrastado);
      const destino = ordem.findIndex((p) => p.arquivo === item.dataset.arquivo);
      if (origem === -1 || destino === -1) return;

      const [pagina] = ordem.splice(origem, 1);
      ordem.splice(destino, 0, pagina);

      salvarPaginasOrdem(ordem.map((p) => p.arquivo));
      renderizarLista();
    });
  </script>
</body>
</html>
